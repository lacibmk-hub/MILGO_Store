<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dugsiga Iftiin Attendance</title>

<style>
*{box-sizing:border-box;font-family:sans-serif}
body{background:#0f172a;color:#e5e7eb;margin:0;padding:20px}

/* login */
#login{display:flex;justify-content:center;align-items:center;height:100vh}
.login-box{
background:#1e293b;padding:30px;border-radius:15px;text-align:center;width:300px;
}
.login-box input{
width:100%;padding:10px;margin-top:10px;border:none;border-radius:10px;background:#0f172a;color:white;
}
.login-box button{
margin-top:10px;padding:10px;width:100%;background:#22c55e;color:white;border:none;border-radius:10px;
}

.container{max-width:1000px;margin:auto;display:none}

.header{text-align:center;margin-bottom:20px}
.header h1{color:#38bdf8}

.logout{
position:absolute;top:20px;right:20px;
background:#ef4444;color:white;padding:8px;border:none;border-radius:10px;
}

/* classes */
.c1{background:#1e293b}
.c2{background:#1f3d2b}
.c3{background:#3f3a1a}
.c4{background:#3b1f1f}
.c5{background:#2e1065}

.tabs{display:flex;gap:10px;justify-content:center;margin-bottom:15px;flex-wrap:wrap;}
.tabs button{padding:10px;border:none;border-radius:20px;background:#1e293b;color:white;cursor:pointer;}
.active{outline:2px solid #38bdf8}

.card{padding:20px;border-radius:15px}

input,textarea{
width:100%;padding:10px;margin-top:10px;border-radius:10px;border:none;background:#1e293b;color:white;
}

button{margin-top:5px;padding:10px;border:none;border-radius:10px;cursor:pointer;}
.add-btn{width:100%;background:#22c55e;color:white}
.report-btn{background:#6366f1;color:white;width:100%}
.delete-btn{background:#ef4444;color:white;padding:5px 10px;border-radius:8px}

.student{
display:flex;justify-content:space-between;background:#1e293b;
padding:10px;margin-top:10px;border-radius:10px;
}

.absent{color:#f87171}

/* modal */
.modal{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);justify-content:center;align-items:center;
}
.modal-box{
background:#1e293b;padding:20px;border-radius:15px;width:90%;max-width:500px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h2>Login</h2>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Gal</button>
<p id="error" style="color:red"></p>
</div>
</div>

<!-- APP -->
<div class="container" id="app">

<button class="logout" onclick="logout()">Logout</button>

<div class="header">
<h1>Dugsiga Iftiin Attendance</h1>
</div>

<div class="tabs">
<button onclick="setClass(1)">Fasal 1</button>
<button onclick="setClass(2)">Fasal 2</button>
<button onclick="setClass(3)">Fasal 3</button>
<button onclick="setClass(4)">Fasal 4</button>
<button onclick="setClass(5)">Fasal 5</button>
</div>

<!-- 📅 التاريخ -->
<input type="date" id="date" onchange="render()">

<div id="card" class="card c1">

<input id="name" placeholder="Magaca ardayga">
<button class="add-btn" onclick="addStudent()">Ku dar arday</button>

<input id="lesson" placeholder="📚 Xiisadda">

<textarea id="bulk" placeholder="Ku dar arday badan"></textarea>
<button class="add-btn" onclick="addBulk()">Ku dar dhammaan</button>

<button class="report-btn" onclick="dailyReport()">📊 Warbixin Maalinle</button>

<input id="search" placeholder="Raadi..." oninput="render()">

<div id="list"></div>

</div>
</div>

<!-- REPORT -->
<div class="modal" id="modal">
<div class="modal-box">
<h3>Warbixin Maalinle</h3>
<div id="report"></div>
<button onclick="closeModal()" class="delete-btn">Xir</button>
</div>
</div>

<script>

/* 🔐 PASSWORD */
const PASSWORD="dugsigaiftiin"

function checkLogin(){
if(localStorage.getItem("login")==="true"){
loginHide()
}else{
loginShow()
}
}

function loginShow(){
document.getElementById("login").style.display="flex"
document.getElementById("app").style.display="none"
}

function loginHide(){
document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"
}

function login(){
let p=document.getElementById("pass").value
if(p===PASSWORD){
localStorage.setItem("login","true")
loginHide()
}else{
document.getElementById("error").innerText="Password qaldan"
}
}

function logout(){
localStorage.removeItem("login")
loginShow()
}

/* DATA */
let current=1
let students={1:[],2:[],3:[],4:[],5:[]}
let attendance={1:{},2:{},3:{},4:{},5:{}}

function getDate(){
return document.getElementById("date").value || new Date().toISOString().slice(0,10)
}

/* fix */
function fixData(data, template){
for(let i=1;i<=5;i++){
if(!data[i]) data[i]=JSON.parse(JSON.stringify(template[i]))
}
return data
}

function load(){
let d=localStorage.getItem("sys")
if(d){
let data=JSON.parse(d)
students=fixData(data.students||{},students)
attendance=fixData(data.attendance||{},attendance)
}
}

function save(){
localStorage.setItem("sys",JSON.stringify({students,attendance}))
}

/* class */
function setClass(c){
current=c
document.getElementById("card").className="card c"+c

document.querySelectorAll(".tabs button").forEach((b,i)=>{
b.classList.toggle("active",i===c-1)
})

render()
}

/* add */
function addStudent(){
let n=document.getElementById("name").value.trim()
if(!n)return
if(students[current].includes(n)) return

students[current].push(n)
document.getElementById("name").value=""
save();render()
}

function addBulk(){
let arr=document.getElementById("bulk").value.split(/[\n,]+/)
arr.forEach(n=>{
n=n.trim()
if(n && !students[current].includes(n)){
students[current].push(n)
}
})
document.getElementById("bulk").value=""
save();render()
}

/* delete */
function del(i){
let n=students[current][i]
if(!confirm("Hubi tirtirid?")) return
if(prompt("Qor DELETE")!=="DELETE") return

students[current].splice(i,1)
delete attendance[current][n]

save();render()
}

/* attendance */
function toggle(i){
let n=students[current][i]
let d=getDate()
let lesson=document.getElementById("lesson").value || "—"

if(!attendance[current][n]) attendance[current][n]={}
attendance[current][n][d]=[{lesson}]

save();render()
}

/* render */
function render(){
let box=document.getElementById("list")
box.innerHTML=""

let search=document.getElementById("search").value.toLowerCase()
let d=getDate()

students[current].forEach((n,i)=>{
let match=n.toLowerCase().includes(search)
if(search && !match) return

let day=(attendance[current][n]||{})[d]

box.innerHTML+=`
<div class="student">
<span>
<b>${n}</b><br>
${day?`<span class="absent">Maqan (${day.map(x=>x.lesson)})</span>`:""}
</span>

<div>
<input type="checkbox" ${day?"checked":""} onclick="toggle(${i})">
<button class="delete-btn" onclick="del(${i})">Delete</button>
</div>
</div>
`
})
}

/* 📊 report */
function dailyReport(){
let d=getDate()
let html=""

for(let c=1;c<=5;c++){
let count=0

students[c].forEach(n=>{
let day=(attendance[c][n]||{})[d]
if(day) count++
})

html+=`<b>Fasal ${c}</b><br>Tirada maqan: ${count}<hr>`
}

document.getElementById("report").innerHTML=html
document.getElementById("modal").style.display="flex"
}

function closeModal(){
document.getElementById("modal").style.display="none"
}

/* init */
load()
checkLogin()
document.getElementById("date").value=new Date().toISOString().slice(0,10)
setClass(1)

</script>

</body>
</html>
